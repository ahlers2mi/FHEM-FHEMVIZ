<!doctype html>
<!--
  FHEMVIZ - moderne, responsive FHEM-Visualisierung (Single-Page-App).

  PoC (v0.2.0): lädt via FHEMWEB-API echte Geräte (jsonlist2), aktualisiert
  live (inform) und schaltet per CSRF-gesichertem set. Ausgeliefert von
  FHEMWEB aus www/fhemviz/:  http://<fhem>:<port>/fhem/fhemviz/index.html

  Buildfrei: native Web Components (ES-Module) + CSS Custom Properties.
  Optional: ?device=<FHEMVIZ-Gerätename>  (sonst erstes TYPE=FHEMVIZ-Gerät)
-->
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FHEMVIZ</title>
    <link rel="stylesheet" href="./css/fhemviz.css" />
  </head>
  <body>
    <header id="viz-header">
      <h1>FHEMVIZ</h1>
      <span id="viz-status" class="viz-status">initialisiere…</span>
    </header>

    <main id="fhemviz-app">
      <noscript>FHEMVIZ benoetigt JavaScript.</noscript>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
