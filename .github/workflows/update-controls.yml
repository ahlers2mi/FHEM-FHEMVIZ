name: Update controls_FHEMVIZ.txt

on:
  push:
    branches:
      - main
    paths:
      - 'FHEM/**'
      - 'www/**'
  workflow_dispatch:

jobs:
  update-controls:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # volle Historie fuer per-Datei-Commitdatum

      - name: Regenerate controls_FHEMVIZ.txt
        run: |
          OUT=controls_FHEMVIZ.txt
          : > "$OUT"
          # Alle auszuliefernden Dateien: Module (FHEM/) + Web-Assets (www/).
          # Pfade sind relativ zur FHEM-Installationswurzel - genau so, wie
          # FHEM 'update' sie erwartet (FHEM/... und www/...).
          while IFS= read -r f; do
            SIZE=$(wc -c < "$f")
            # Zeitstempel = letztes Commit-Datum der Datei (UTC), damit nur
            # tatsaechlich geaenderte Dateien beim naechsten 'update' neu
            # geladen werden.
            DATE=$(TZ=UTC git log -1 --format=%cd \
                     --date=format-local:'%Y-%m-%d_%H:%M:%S' -- "$f")
            [ -z "$DATE" ] && DATE=$(date -u +"%Y-%m-%d_%H:%M:%S")
            echo "UPD ${DATE} ${SIZE} ${f}" >> "$OUT"
          done < <(find FHEM www -type f ! -name '.*' | sort)

      - name: Commit updated controls_FHEMVIZ.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add controls_FHEMVIZ.txt
          git diff --cached --quiet || git commit -m "Auto-update controls_FHEMVIZ.txt"
          git push
