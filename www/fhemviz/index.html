<!doctype html>
<!--
  FHEMVIZ - moderne, responsive FHEM-Visualisierung (Single-Page-App).

  v0.7.0: Tablet-Modus (Touch, Raum-Tabs unten) und TV-/Kiosk-Modus
  (bedienlos, Szenen-Rotation, Event-Uebernahme via "set <viz> scene ...").
  Ausgeliefert von FHEMWEB aus www/fhemviz/:
    http://<fhem>:<port>/fhem/fhemviz/index.html
  URL-Parameter: ?device=<FHEMVIZ-Geraet>  ?mode=tablet|tv

  Buildfrei: native Web Components (ES-Module) + CSS Custom Properties.
-->
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FHEMVIZ</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <meta name="theme-color" content="#0a0c0f" />
    <link rel="stylesheet" href="./css/fhemviz.css" />
  </head>
  <body>
    <header id="viz-header">
      <h1 id="viz-title">FHEMVIZ</h1>
      <span id="viz-scene" class="viz-scene" hidden></span>
      <span id="viz-status" class="viz-status">initialisiere…</span>
      <span id="viz-clock" class="viz-clock" hidden></span>
      <span id="viz-headinfo" hidden></span>
      <div id="viz-statusbar" hidden></div>
      <div id="viz-progress" hidden><i></i></div>
    </header>

    <main id="fhemviz-app">
      <noscript>FHEMVIZ benoetigt JavaScript.</noscript>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
